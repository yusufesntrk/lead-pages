<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#1a1a1a" rx="6"/>
  <g transform="translate(16,11) scale(0.28)" fill="white">
    <!-- Chef Hat -->
    <ellipse cx="0" cy="-18" rx="28" ry="22"/>
    <rect x="-20" y="-18" width="40" height="14" rx="2"/>
    <circle cx="-16" cy="-26" r="10"/>
    <circle cx="0" cy="-32" r="12"/>
    <circle cx="16" cy="-26" r="10"/>
    <rect x="-20" y="-6" width="40" height="4" rx="1"/>
    <!-- Fork -->
